<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Marks Entry - RFID Attendance</title>
    <link rel="stylesheet" href="dashboard-style.css">
    <style>
        :root {
            --blue-50: #E6F1FB; --blue-100: #B5D4F4; --blue-200: #85B7EB;
            --blue-400: #378ADD; --blue-600: #185FA5; --blue-800: #0C447C;
            --green-50: #EAF3DE; --green-100: #C0DD97; --green-400: #639922;
            --green-600: #3B6D11; --green-800: #27500A;
            --amber-50: #FAEEDA; --amber-100: #FAC775; --amber-400: #EF9F27;
            --amber-600: #BA7517; --amber-800: #854F0B;
            --red-50: #FCEBEB; --red-100: #F7C1C1; --red-400: #E24B4A;
            --red-600: #A32D2D; --red-800: #791F1F;
            --coral-50: #FAECE7; --coral-100: #F5C4B3; --coral-400: #D85A30;
            --coral-600: #993C1D;
            --purple-50: #EEEDFE; --purple-100: #CECBF6; --purple-400: #7F77DD;
            --purple-600: #534AB7; --purple-800: #3C3489;
            --gray-50: #F1EFE8; --gray-100: #D3D1C7; --gray-200: #B4B2A9;
            --gray-400: #888780; --gray-600: #5F5E5A; --gray-800: #444441;
            --teal-50: #E1F5EE; --teal-600: #0F6E56; --teal-800: #085041;
        }

        .nav-item-marks { background: rgba(255,255,255,0.18) !important; border-left: 3px solid white !important; }
        .nav-sep { height: 1px; background: rgba(255,255,255,0.15); margin: 6px 0; }
        .nav-section-label { padding: 10px 20px 4px; color: rgba(255,255,255,0.55); font-size: 10px; text-transform: uppercase; letter-spacing: 0.6px; }

        /* Page header bar */
        .page-controls {
            display: flex; gap: 10px; flex-wrap: wrap;
            align-items: center; margin-bottom: 18px;
            background: white; border-radius: 10px;
            padding: 14px 18px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }
        .page-controls select, .page-controls input[type=text] {
            padding: 8px 12px; border: 1px solid #e0e0e0;
            border-radius: 8px; font-size: 13px; background: white;
            color: #333;
        }
        .ctrl-label { font-size: 12px; color: #888; white-space: nowrap; }

        /* Class selector pill */
        .class-pill {
            display: inline-flex; align-items: center; gap: 6px;
            background: var(--blue-50); color: var(--blue-800);
            border: 1px solid var(--blue-200); border-radius: 20px;
            padding: 4px 12px; font-size: 12px; font-weight: 500;
        }

        /* Buttons */
        .btn { padding: 8px 16px; border: 1px solid #e0e0e0; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 500; background: white; color: #333; transition: all 0.15s; }
        .btn:hover { background: #f5f5f5; }
        .btn-primary { background: var(--blue-600); color: white; border-color: var(--blue-600); }
        .btn-primary:hover { background: var(--blue-800); }
        .btn-success { background: var(--green-600); color: white; border-color: var(--green-600); }
        .btn-success:hover { background: var(--green-800); }
        .btn-danger { background: var(--red-600); color: white; border-color: var(--red-600); }
        .btn-warning { background: var(--amber-600); color: white; border-color: var(--amber-600); }
        .btn-sm { padding: 5px 10px; font-size: 12px; border-radius: 6px; }
        .btn-icon { padding: 5px 8px; font-size: 14px; }

        /* Summary cards row */
        .summary-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
        .sum-card { flex: 1; min-width: 100px; background: #f8f9fa; border-radius: 8px; padding: 12px 14px; border: 1px solid #eee; }
        .sum-card .lbl { font-size: 11px; color: #888; margin-bottom: 4px; }
        .sum-card .val { font-size: 22px; font-weight: 500; color: #333; }
        .sum-card .sub { font-size: 11px; color: #aaa; margin-top: 2px; }
        .sum-pass .val { color: var(--green-600); }
        .sum-fail .val { color: var(--red-600); }
        .sum-avg .val { color: var(--blue-600); }

        /* Subject tabs */
        .subject-strip {
            display: flex; gap: 6px; flex-wrap: wrap;
            margin-bottom: 0; padding: 14px 16px 0;
            background: white; border-radius: 10px 10px 0 0;
            border: 1px solid #e8e8e8; border-bottom: none;
        }
        .sub-tab {
            display: flex; align-items: center; gap: 6px;
            padding: 7px 14px; border-radius: 8px 8px 0 0;
            cursor: pointer; font-size: 13px; font-weight: 500;
            border: 1px solid transparent; background: #f5f5f5; color: #666;
            transition: all 0.15s; border-bottom: none;
            position: relative; top: 1px;
        }
        .sub-tab.active {
            background: white; color: var(--blue-800);
            border-color: #e8e8e8; border-bottom-color: white;
        }
        .sub-tab .exam-badge {
            font-size: 10px; padding: 1px 5px; border-radius: 4px;
            background: var(--blue-50); color: var(--blue-600);
        }
        .sub-tab.active .exam-badge { background: var(--blue-100); }
        .sub-tab .remove-sub {
            font-size: 13px; color: #bbb; cursor: pointer; padding: 0 2px;
            line-height: 1;
        }
        .sub-tab .remove-sub:hover { color: var(--red-600); }
        .add-subject-btn {
            padding: 7px 12px; border: 1px dashed #ccc; border-radius: 8px 8px 0 0;
            background: transparent; color: #999; cursor: pointer; font-size: 13px;
            display: flex; align-items: center; gap: 4px;
            position: relative; top: 1px;
        }
        .add-subject-btn:hover { border-color: var(--blue-400); color: var(--blue-600); }

        /* Marks table card */
        .marks-card {
            background: white; border: 1px solid #e8e8e8;
            border-radius: 0 0 10px 10px; overflow: hidden;
        }
        .marks-card-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 16px; border-bottom: 1px solid #f0f0f0;
            flex-wrap: wrap; gap: 8px;
        }
        .marks-card-header h3 { font-size: 14px; font-weight: 500; color: #333; margin: 0; }
        .max-mark-ctrl { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #666; }
        .max-mark-ctrl input {
            width: 64px; padding: 5px 8px; border: 1px solid #e0e0e0;
            border-radius: 6px; font-size: 13px; text-align: center;
        }

        /* The table */
        .marks-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .marks-table th {
            background: #f8f9fa; padding: 9px 12px; text-align: left;
            font-weight: 500; color: #555; border-bottom: 1px solid #eee;
            white-space: nowrap; font-size: 12px;
        }
        .marks-table th.center { text-align: center; }
        .marks-table td { padding: 8px 12px; border-bottom: 1px solid #f5f5f5; vertical-align: middle; }
        .marks-table tr:hover td { background: #fafafa; }
        .marks-table tr.row-saved td { background: #f9fff5; }
        .marks-table tr:last-child td { border-bottom: none; }

        .student-name { font-weight: 500; color: #333; }
        .student-roll { font-size: 11px; color: #999; }

        /* Mark input */
        .mark-input {
            width: 64px; padding: 6px 8px; border: 1px solid #e0e0e0;
            border-radius: 6px; font-size: 13px; text-align: center;
            transition: border-color 0.15s;
        }
        .mark-input:focus { outline: none; border-color: var(--blue-400); }
        .mark-input.is-over { border-color: var(--red-400); background: var(--red-50); }
        .mark-input.is-good { border-color: var(--green-400); background: var(--green-50); }
        .mark-input.is-warn { border-color: var(--amber-400); }

        /* Percentage bar */
        .pct-bar-wrap { display: flex; align-items: center; gap: 8px; min-width: 120px; }
        .pct-bar-bg { flex: 1; height: 6px; background: #eee; border-radius: 3px; overflow: hidden; }
        .pct-bar-fill { height: 100%; border-radius: 3px; transition: width 0.2s; }
        .pct-val { font-size: 12px; font-weight: 500; min-width: 36px; text-align: right; }

        /* Grade pill */
        .grade-pill { display: inline-block; padding: 2px 9px; border-radius: 10px; font-size: 11px; font-weight: 500; text-align: center; min-width: 28px; }
        .g-O  { background: var(--purple-50); color: var(--purple-800); }
        .g-A+ { background: var(--green-50); color: var(--green-800); }
        .g-A  { background: var(--green-50); color: var(--green-600); }
        .g-B+ { background: var(--blue-50); color: var(--blue-800); }
        .g-B  { background: var(--blue-50); color: var(--blue-600); }
        .g-C  { background: var(--amber-50); color: var(--amber-800); }
        .g-D  { background: var(--coral-50); color: var(--coral-600); }
        .g-F  { background: var(--red-50); color: var(--red-600); }
        .g-   { background: #f0f0f0; color: #aaa; }

        /* Status badge */
        .status-chip { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; padding: 3px 10px; border-radius: 10px; }
        .status-chip .dot { width: 6px; height: 6px; border-radius: 50%; }
        .sc-saving .dot { background: var(--amber-400); }
        .sc-saved  .dot { background: var(--green-400); }
        .sc-error  .dot { background: var(--red-400); }
        .sc-saving { background: var(--amber-50); color: var(--amber-800); }
        .sc-saved  { background: var(--green-50); color: var(--green-800); }
        .sc-error  { background: var(--red-50); color: var(--red-800); }

        /* Empty state */
        .empty-state { padding: 3rem 2rem; text-align: center; color: #aaa; }
        .empty-icon { font-size: 40px; margin-bottom: 12px; line-height: 1; }
        .empty-state p { margin: 6px 0; font-size: 14px; }
        .empty-state .hint { font-size: 12px; color: #bbb; }

        /* Add subject inline form */
        .add-sub-form {
            display: none; align-items: center; gap: 8px; flex-wrap: wrap;
            padding: 10px 16px; background: var(--blue-50);
            border-bottom: 1px solid #e0e0e0;
        }
        .add-sub-form.open { display: flex; }
        .add-sub-form input, .add-sub-form select {
            padding: 7px 10px; border: 1px solid #d0d0d0;
            border-radius: 6px; font-size: 13px; background: white;
        }
        .add-sub-form input { width: 180px; }
        .add-sub-form select { min-width: 140px; }

        /* Report card modal */
        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.45); z-index: 2000;
            align-items: center; justify-content: center; padding: 20px;
        }
        .modal-overlay.open { display: flex; }
        .modal-box {
            background: white; border-radius: 12px;
            width: 100%; max-width: 640px; max-height: 88vh; overflow-y: auto;
        }
        .modal-hdr { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-bottom: 1px solid #eee; }
        .modal-hdr h2 { font-size: 15px; font-weight: 500; margin: 0; color: #333; }
        .modal-close { background: none; border: none; font-size: 20px; cursor: pointer; color: #999; line-height: 1; }
        .modal-body { padding: 20px; }

        /* Report card inside modal */
        .report-student { font-size: 20px; font-weight: 500; color: #333; margin-bottom: 2px; }
        .report-meta { font-size: 13px; color: #888; margin-bottom: 18px; }
        .report-tbl { width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 16px; }
        .report-tbl th { background: #f8f9fa; padding: 8px 10px; text-align: left; font-weight: 500; color: #555; border-bottom: 1px solid #eee; font-size: 12px; }
        .report-tbl td { padding: 8px 10px; border-bottom: 1px solid #f5f5f5; }
        .report-tbl tr:last-child td { border-bottom: none; }
        .report-total-bar {
            background: linear-gradient(135deg, var(--blue-600), var(--purple-600));
            border-radius: 10px; padding: 16px 20px;
            display: flex; justify-content: space-between; align-items: center;
            color: white; margin-bottom: 14px;
        }
        .report-total-bar .big { font-size: 32px; font-weight: 500; }
        .report-total-bar .note { font-size: 12px; opacity: 0.8; margin-top: 2px; }
        .print-btn { width: 100%; padding: 11px; background: var(--blue-600); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 500; }
        .print-btn:hover { background: var(--blue-800); }

        /* Toast */
        .toast {
            position: fixed; bottom: 22px; right: 22px; z-index: 9999;
            padding: 10px 18px; border-radius: 10px; font-size: 13px;
            color: white; opacity: 0; pointer-events: none; transition: opacity 0.25s;
        }
        .toast.show { opacity: 1; }
        .toast.success { background: var(--green-600); }
        .toast.error   { background: var(--red-600); }
        .toast.info    { background: var(--blue-600); }

        /* Instructions */
        .tip-box {
            display: flex; gap: 12px; align-items: flex-start;
            background: var(--blue-50); border-left: 3px solid var(--blue-400);
            border-radius: 0 8px 8px 0; padding: 12px 14px;
            margin-bottom: 16px; font-size: 13px; color: var(--blue-800);
        }
        .tip-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }

        /* Read-only overlay for subject teachers */
        .readonly-badge {
            display: inline-flex; align-items: center; gap: 5px;
            background: var(--amber-50); color: var(--amber-800);
            border: 1px solid var(--amber-100); border-radius: 6px;
            padding: 4px 10px; font-size: 12px; font-weight: 500;
        }

        /* Pagination */
        .table-footer {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 16px; border-top: 1px solid #f0f0f0; font-size: 12px; color: #888;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .marks-table { font-size: 12px; min-width: 560px; }
            .marks-table th, .marks-table td { padding: 7px 8px; }
            .mark-input { width: 54px; }
            .pct-bar-wrap { min-width: 90px; }
            .summary-row { gap: 6px; }
        }
    </style>
</head>
<body>
<div class="dashboard">

    <aside class="sidebar">
        <div class="sidebar-header">
            <h2>🎓 RFID System</h2>
            <p id="userName">Loading...</p>
        </div>
        <nav class="sidebar-nav" id="sidebarNav">
            <p style="padding:15px;color:rgba(255,255,255,0.4);font-size:13px;">Loading...</p>
        </nav>
        <button class="logout-btn" id="logoutBtn">🚪 Logout</button>
    </aside>

    <main class="main-content">
        <div class="top-bar">
            <h1>📝 Marks Entry</h1>
            <div class="top-bar-info"><span id="currentDate"></span></div>
        </div>

        <!-- Page controls -->
        <div class="page-controls">
            <span class="ctrl-label">Class</span>
            <select id="classSelect" style="min-width:130px;">
                <option value="">— Select —</option>
            </select>

            <span class="ctrl-label" style="margin-left:8px;">Section</span>
            <select id="sectionSelect" style="min-width:100px;" disabled>
                <option value="">— All —</option>
            </select>

            <span class="ctrl-label" style="margin-left:8px;">Exam</span>
            <select id="examTypeSelect" style="min-width:140px;">
                <option value="unit_test_1">Unit Test 1</option>
                <option value="unit_test_2">Unit Test 2</option>
                <option value="midterm">Midterm</option>
                <option value="final">Final Exam</option>
                <option value="practical">Practical</option>
                <option value="assignment">Assignment</option>
                <option value="project">Project</option>
            </select>

            <div style="flex:1;"></div>

            <div id="statusChip" style="display:none;"></div>

            <button class="btn" onclick="exportCSV()" title="Export CSV">⬇ Export</button>
            <button class="btn btn-success" onclick="saveAllMarks()" id="saveBtn">💾 Save All</button>
        </div>

        <!-- Summary row (shown after class loads) -->
        <div class="summary-row" id="summaryRow" style="display:none;"></div>

        <!-- Subject strip + marks table -->
        <div id="marksPanel">
            <div class="empty-state" style="background:white;border-radius:10px;border:1px solid #e8e8e8;">
                <div class="empty-icon">📋</div>
                <p>Select a class to begin entering marks</p>
                <p class="hint">You can add subjects and enter marks for all students</p>
            </div>
        </div>
    </main>
</div>

<!-- Report card modal -->
<div class="modal-overlay" id="reportModal">
    <div class="modal-box">
        <div class="modal-hdr">
            <h2>Student Report Card</h2>
            <button class="modal-close" onclick="closeReport()">&times;</button>
        </div>
        <div class="modal-body" id="reportBody"></div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Auth ──────────────────────────────────────────────────────────────────────
const SESSION = localStorage.getItem('sessionId');
const USER    = JSON.parse(localStorage.getItem('user') || '{}');
if (!SESSION) { window.location.href = '/index.html'; }

document.getElementById('userName').textContent    = USER.name || 'User';
document.getElementById('currentDate').textContent = new Date().toLocaleDateString('en-IN', {
    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
});

// ── Role determination ────────────────────────────────────────────────────────
const IS_ADMIN   = USER.role === 'admin';
const ASGN       = JSON.parse(localStorage.getItem('assignments') || '{"ct":[],"st":[]}');

// Store full assignment objects for section-aware checking
const CT_ASSIGNMENTS = ASGN.ct || [];
const ST_ASSIGNMENTS = ASGN.st || [];

// Extract base class names for compatibility
const CT_CLASSES = CT_ASSIGNMENTS.map(a => a.class_name);
const ST_CLASSES = ST_ASSIGNMENTS.map(a => a.class_name);

// Helper to format class display
const formatClassDisplay = (a) => a.section ? `${a.class_name}-${a.section}` : a.class_name;

// Check if user can edit marks for a class/section
// OPTIMIZED: New model checks both class and section
function canEdit(baseClass, section) {
    // Admin can edit marks in ALL classes
    if (IS_ADMIN) return true;
    // Teachers can edit only their CT classes (matching base class and optional section)
    return CT_ASSIGNMENTS.some(a => {
        if (a.class_name !== baseClass) return false;
        // If assignment has no section, teacher has access to all sections
        if (!a.section) return true;
        // If no section selected, teacher can edit (will be filtered by section select)
        if (!section) return true;
        // Otherwise section must match
        return a.section === section;
    });
}

// Check if user can view marks for a class/section
function canView(baseClass, section) {
    // Admin can view ALL classes
    if (IS_ADMIN) return true;
    // Teachers can view their CT and ST classes
    const allAssignments = [...CT_ASSIGNMENTS, ...ST_ASSIGNMENTS];
    return allAssignments.some(a => {
        if (a.class_name !== baseClass) return false;
        // If assignment has no section, teacher has access to all sections
        if (!a.section) return true;
        // If no section selected, teacher can view
        if (!section) return true;
        // Otherwise section must match
        return a.section === section;
    });
}

// ── Sidebar ───────────────────────────────────────────────────────────────────
(function buildSidebar() {
    const nav = document.getElementById('sidebarNav');
    const sep = () => '<div class="nav-sep"></div>';
    const lbl = t => `<div class="nav-section-label">${t}</div>`;

    if (IS_ADMIN) {
        nav.innerHTML = `
            <a href="admin-dashboard.html" class="nav-item" data-section="teachers">👥 Manage Teachers</a>
            <a href="admin-dashboard.html" class="nav-item" data-section="assignments">📚 Class Assignments</a>
            <a href="admin-dashboard.html" class="nav-item" data-section="students">👨‍🎓 Manage Students</a>
            <a href="admin-dashboard.html" class="nav-item" data-section="attendance">📊 Attendance Records</a>
            ${sep()}
            <a href="analytics.html"    class="nav-item">🤖 ML Analytics</a>
            <a href="marks-entry.html"  class="nav-item nav-item-marks">📝 Marks Entry</a>
        `;
    } else {
        // Show class-section format in sidebar
        const rows = [
            ...CT_ASSIGNMENTS.map(a => {
                const display = formatClassDisplay(a);
                return `<div style="display:flex;align-items:center;justify-content:space-between;padding:4px 0;"><span style="color:rgba(255,255,255,.9);font-size:13px;">• ${display}</span><span style="background:#4CAF50;color:white;font-size:9px;padding:1px 6px;border-radius:4px;">CT</span></div>`;
            }),
            ...ST_ASSIGNMENTS.map(a => {
                const display = formatClassDisplay(a);
                return `<div style="display:flex;align-items:center;justify-content:space-between;padding:4px 0;"><span style="color:rgba(255,255,255,.9);font-size:13px;">• ${display}</span><span style="background:#2196F3;color:white;font-size:9px;padding:1px 6px;border-radius:4px;">ST</span></div>`;
            })
        ].join('');
        nav.innerHTML = `
            ${lbl('Your Classes')}
            <div style="padding:4px 15px 8px;">${rows || '<span style="color:rgba(255,255,255,.4);font-size:12px;">No assignments</span>'}</div>
            ${sep()}
            ${lbl('Navigation')}
            <a href="teacher-dashboard.html" class="nav-item">🏠 Dashboard</a>
            <a href="analytics.html"         class="nav-item">🤖 ML Analytics</a>
            <a href="marks-entry.html"        class="nav-item nav-item-marks">📝 Marks Entry</a>
        `;
    }
    nav.querySelectorAll('[data-section]').forEach(l =>
        l.addEventListener('click', () => sessionStorage.setItem('adminTab', l.dataset.section))
    );
})();

document.getElementById('logoutBtn').addEventListener('click', async () => {
    await fetch('/auth/logout', { method: 'POST', headers: { 'X-Session-Id': SESSION } });
    localStorage.clear();
    window.location.href = '/index.html';
});

// ── Default subjects per class pattern ───────────────────────────────────────
// Optimized: Uses base class only (section is separate)
const CLASS_SUBJECT_DEFAULTS = {
    '11': ['Mathematics', 'Physics', 'Chemistry', 'Artificial Intelligence', 'English'],
    '12': ['Mathematics', 'Physics', 'Chemistry', 'Artificial Intelligence', 'English'],
    '10': ['Mathematics', 'Science', 'Social Studies', 'Hindi', 'English'],
    '9':  ['Mathematics', 'Science', 'Social Studies', 'Hindi', 'English'],
    '8':  ['Mathematics', 'Science', 'Social Studies', 'Hindi', 'English'],
    '7':  ['Mathematics', 'Science', 'Social Studies', 'Hindi', 'English'],
    '6':  ['Mathematics', 'Science', 'Social Studies', 'Hindi', 'English'],
};
const DEFAULT_SUBJECTS = ['Mathematics', 'Science', 'Social Studies', 'English', 'Hindi'];

// Get default subjects based on base class (section is now separate)
function getDefaultSubjects(baseClass) {
    if (!baseClass) return DEFAULT_SUBJECTS;
    // Exact match for base class (e.g., '11', '10', '9')
    return CLASS_SUBJECT_DEFAULTS[baseClass] || DEFAULT_SUBJECTS;
}

// ── Grade logic (CBSE / Indian school standard) ───────────────────────────────
// Grade based on percentage (not raw marks)
function calcGrade(pct) {
    if (pct >= 91) return { g: 'O',  label: 'Outstanding', color: '#7F77DD' };
    if (pct >= 81) return { g: 'A+', label: 'Excellent',   color: '#3B6D11' };
    if (pct >= 71) return { g: 'A',  label: 'Very Good',   color: '#639922' };
    if (pct >= 61) return { g: 'B+', label: 'Good',        color: '#185FA5' };
    if (pct >= 51) return { g: 'B',  label: 'Above Avg',   color: '#378ADD' };
    if (pct >= 41) return { g: 'C',  label: 'Average',     color: '#BA7517' };
    if (pct >= 33) return { g: 'D',  label: 'Below Avg',   color: '#D85A30' };
    return              { g: 'F',  label: 'Fail',         color: '#A32D2D' };
}

// Percentage = (marks_obtained / max_marks) * 100
function getPct(marks, maxMark) {
    if (marks === null || marks === '' || maxMark === 0) return null;
    return Math.round((Number(marks) / Number(maxMark)) * 100 * 10) / 10;
}

// Grade points for GPA (0–10 scale, CBSE style)
function gradePoint(pct) {
    if (pct === null) return null;
    if (pct >= 91) return 10;
    if (pct >= 81) return 9;
    if (pct >= 71) return 8;
    if (pct >= 61) return 7;
    if (pct >= 51) return 6;
    if (pct >= 41) return 5;
    if (pct >= 33) return 4;
    return 0;
}

function pctBarColor(pct) {
    if (pct === null) return '#e0e0e0';
    if (pct >= 75) return '#4CAF50';
    if (pct >= 50) return '#FF9800';
    return '#F44336';
}

const examLabels = {
    unit_test_1: 'Unit Test 1', unit_test_2: 'Unit Test 2',
    midterm: 'Midterm', final: 'Final Exam',
    practical: 'Practical', assignment: 'Assignment', project: 'Project'
};

const defaultMaxMarks = {
    unit_test_1: 20, unit_test_2: 20, midterm: 50, final: 100,
    practical: 30, assignment: 20, project: 25
};

// ── State ─────────────────────────────────────────────────────────────────────
let students    = [];
let subjects    = [];   // [{name, exam, maxMark, marks: {id: val}}]
let activeSub   = 0;
let currentClass = '';
let currentSection = '';  // Filter by specific section (e.g., 'A', 'B') or empty for all
let isReadOnly  = false;
let availableSections = []; // Sections available for selected class (from assignments)
let allClasses  = [];   // All available classes from server

// ── Helper: Parse class name to extract base class and section ─────────────────
// Handles both "11-B" and "11B" formats (kept for backward compatibility)
function parseClassName(className) {
    if (!className) return { base: '', section: '' };

    // Check if it has a hyphen
    if (className.includes('-')) {
        const parts = className.split('-');
        return { base: parts[0], section: parts[1] || '' };
    }

    // No hyphen - extract digits for base, letters for section
    const match = className.match(/^(\d+)([a-zA-Z]*)$/);
    if (match) {
        return { base: match[1], section: match[2] || '' };
    }

    return { base: className, section: '' };
}

function getBaseClass(className) {
    return parseClassName(className).base;
}

function getSection(className) {
    return parseClassName(className).section;
}

// Get available sections for a base class from assignments
// OPTIMIZED: Uses new model with separate class/section
function getAvailableSections(baseClass) {
    const sections = new Set();
    const allAssignments = [...CT_ASSIGNMENTS, ...ST_ASSIGNMENTS];

    allAssignments.forEach(a => {
        if (a.class_name === baseClass && a.section) {
            sections.add(a.section);
        }
    });

    return [...sections].sort();
}

// ── API helper ────────────────────────────────────────────────────────────────
async function api(url, opts = {}) {
    const r = await fetch(url, {
        ...opts,
        headers: { 'Content-Type': 'application/json', 'X-Session-Id': SESSION, ...(opts.headers || {}) }
    });
    if (r.status === 401) { localStorage.clear(); window.location.href = '/index.html'; return null; }
    return r.json();
}

// ── Init ──────────────────────────────────────────────────────────────────────
// OPTIMIZED: Uses new class/section model
async function init() {
    const data = await api('/api/marks/classes');
    if (!data || !data.success) { showToast('Failed to load classes', 'error'); return; }

    const sel = document.getElementById('classSelect');
    if (!data.classes.length) {
        sel.innerHTML = '<option value="">No classes found</option>';
        return;
    }

    // Store all classes for section extraction
    allClasses = data.classes;

    // For teachers, only show classes they have access to
    let displayClasses = data.classes;
    if (!IS_ADMIN) {
        const accessibleClasses = [...new Set([...CT_CLASSES, ...ST_CLASSES])];
        displayClasses = data.classes.filter(c => accessibleClasses.includes(c));
    }

    // Populate class dropdown with base classes
    sel.innerHTML = '<option value="">— Select —</option>';
    displayClasses.forEach(c => sel.innerHTML += `<option value="${c}">Class ${c}</option>`);

    // Auto-select first CT class for teachers
    if (!IS_ADMIN && CT_ASSIGNMENTS.length) {
        const firstCT = CT_ASSIGNMENTS[0];
        sel.value = firstCT.class_name;
        updateSectionOptions();
        // Pre-select section if CT has one
        if (firstCT.section) {
            const sectionSel = document.getElementById('sectionSelect');
            if (sectionSel.querySelector(`option[value="${firstCT.section}"]`)) {
                sectionSel.value = firstCT.section;
                currentSection = firstCT.section;
            }
        }
        await loadClass();
    }
}

document.getElementById('classSelect').addEventListener('change', () => {
    updateSectionOptions();
    loadClass();
});
document.getElementById('sectionSelect').addEventListener('change', () => {
    currentSection = document.getElementById('sectionSelect').value;
    loadClass();
});

// Extract and populate sections based on selected class
function updateSectionOptions() {
    const baseClass = document.getElementById('classSelect').value;
    const sectionSel = document.getElementById('sectionSelect');

    if (!baseClass) {
        sectionSel.innerHTML = '<option value="">— All —</option>';
        sectionSel.disabled = true;
        currentSection = '';
        return;
    }

    // Get sections from teacher assignments for non-admin users
    let sections = [];
    if (!IS_ADMIN) {
        // Get sections from teacher's CT and ST assignments for this class
        const allAssignments = [...CT_ASSIGNMENTS, ...ST_ASSIGNMENTS];
        const classAssignments = allAssignments.filter(a => a.class_name === baseClass);

        // If teacher has assignments with specific sections, use those
        const assignmentSections = classAssignments
            .map(a => a.section)
            .filter(s => s); // remove null/empty

        if (assignmentSections.length > 0) {
            sections = [...new Set(assignmentSections)].sort();
        }
    }

    // If no sections from assignments (or admin), try to extract from allClasses
    if (sections.length === 0) {
        sections = allClasses
            .filter(c => getBaseClass(c) === baseClass)
            .map(c => getSection(c))
            .filter(v => v) // remove empty sections
            .filter((v, i, a) => a.indexOf(v) === i) // unique
            .sort();
    }

    sectionSel.innerHTML = '<option value="">All Sections</option>';
    sections.forEach(s => {
        sectionSel.innerHTML += `<option value="${s}">Section ${s}</option>`;
    });
    sectionSel.disabled = false;
    currentSection = '';
    sectionSel.value = '';
}

async function loadClass() {
    const baseClass = document.getElementById('classSelect').value;
    currentSection = document.getElementById('sectionSelect').value;

    if (!baseClass) return;

    // Set current class using new model (baseClass + section separately)
    currentClass = currentSection ? `${baseClass}-${currentSection}` : baseClass;

    // Admin can edit ALL classes, teachers only their CT classes
    // Pass the base class for permission check (CT assignments use base class)
    isReadOnly = !canEdit(baseClass);

    // Fetch students by base class - API now handles section properly
    const data = await api(`/api/marks/students/${encodeURIComponent(baseClass)}?section=${encodeURIComponent(currentSection || '')}`);

    if (!data || !data.success) { showToast('Failed to load students', 'error'); return; }

    // Students are already filtered by section on the server side
    students = data.students || [];

    subjects = [];
    activeSub = 0;

    if (!students.length) {
        const sectionLabel = currentSection ? `Section ${currentSection}` : 'any section';
        document.getElementById('marksPanel').innerHTML = `
            <div class="empty-state" style="background:white;border-radius:10px;border:1px solid #e8e8e8;">
                <div class="empty-icon">👨‍🎓</div>
                <p>No students in Class ${baseClass} ${sectionLabel}</p>
                <p class="hint">Register students via Admin Dashboard first</p>
            </div>`;
        document.getElementById('summaryRow').style.display = 'none';
        return;
    }

    // Load existing marks (filter by selected section)
    const existing = await api(`/api/marks/records/${encodeURIComponent(baseClass)}?section=${encodeURIComponent(currentSection || '')}`);
    if (existing && existing.success && existing.records.length) {
        rebuildFromRecords(existing.records);
    }

    // If no subjects, seed with defaults
    if (!subjects.length) {
        const exam = document.getElementById('examTypeSelect').value;
        const mm   = defaultMaxMarks[exam] || 100;
        getDefaultSubjects(baseClass).forEach(name => {
            subjects.push({ name, exam, maxMark: mm, marks: {} });
        });
        activeSub = 0;
    }

    renderAll();
}

function rebuildFromRecords(records) {
    const map = {};
    records.forEach(r => {
        const key = r.subject + '||' + r.exam_type;
        if (!map[key]) map[key] = { name: r.subject, exam: r.exam_type, maxMark: r.max_mark, marks: {} };
        map[key].marks[r.student_id] = r.marks_obtained;
    });
    subjects = Object.values(map);
}

// ── Render everything ─────────────────────────────────────────────────────────
function renderAll() {
    renderSummary();
    renderPanel();
}

function renderSummary() {
    const row = document.getElementById('summaryRow');
    if (!subjects.length || !students.length) { row.style.display = 'none'; return; }

    const sub = subjects[activeSub];
    let entered = 0, passCount = 0, failCount = 0, totalPct = 0, totalGP = 0;
    students.forEach(st => {
        const v = sub.marks[st.id];
        if (v !== undefined && v !== '') {
            entered++;
            const pct = getPct(v, sub.maxMark);
            if (pct !== null) {
                totalPct += pct;
                totalGP  += (gradePoint(pct) || 0);
                if (pct >= 33) passCount++;
                else failCount++;
            }
        }
    });

    const avgPct = entered ? (totalPct / entered).toFixed(1) : '—';
    const avgGP  = entered ? (totalGP / entered).toFixed(2) : '—';
    const highScore = entered ? Math.max(...students.filter(s => sub.marks[s.id] !== undefined && sub.marks[s.id] !== '').map(s => sub.marks[s.id])) : '—';
    const lowScore  = entered ? Math.min(...students.filter(s => sub.marks[s.id] !== undefined && sub.marks[s.id] !== '').map(s => sub.marks[s.id])) : '—';

    row.style.display = 'flex';
    row.innerHTML = `
        ${sc('Total Students', students.length, '', 'enrolled')}
        ${sc('Marks Entered', entered, '', `of ${students.length}`)}
        ${sc('Class Average', avgPct !== '—' ? avgPct + '%' : '—', 'sum-avg', 'of all entered')}
        ${sc('CGPA (avg)', avgGP, 'sum-avg', '10-point scale')}
        ${sc('Passed', passCount, 'sum-pass', '≥ 33%')}
        ${sc('Failed', failCount, 'sum-fail', '< 33%')}
        ${sc('Highest', highScore !== '—' ? highScore + '/' + sub.maxMark : '—', '', '')}
        ${sc('Lowest',  lowScore  !== '—' ? lowScore  + '/' + sub.maxMark : '—', '', '')}
    `;
}

function sc(lbl, val, cls, sub) {
    return `<div class="sum-card ${cls}">
        <div class="lbl">${lbl}</div>
        <div class="val">${val}</div>
        ${sub ? `<div class="sub">${sub}</div>` : ''}
    </div>`;
}

// ── Render panel (tabs + table) ───────────────────────────────────────────────
function renderPanel() {
    const panel = document.getElementById('marksPanel');
    const exam  = document.getElementById('examTypeSelect').value;
    const ro    = isReadOnly;

    // Subject strip
    const tabs = subjects.map((s, i) => `
        <div class="sub-tab ${i === activeSub ? 'active' : ''}" onclick="switchSub(${i})">
            ${s.name}
            <span class="exam-badge">${examLabels[s.exam] || s.exam}</span>
            ${!ro ? `<span class="remove-sub" onclick="event.stopPropagation();removeSub(${i})" title="Remove subject">&times;</span>` : ''}
        </div>
    `).join('');

    const addBtn = !ro ? `
        <button class="add-subject-btn" onclick="toggleAddForm()" id="addSubBtn">+ Add Subject</button>
    ` : '';

    const roNote = ro ? `
        <div style="padding:8px 16px;">
            <span class="readonly-badge">&#9432; View only — Subject Teachers cannot edit marks</span>
        </div>
    ` : '';

    const addForm = !ro ? `
        <div class="add-sub-form" id="addSubForm">
            <input type="text" id="newSubName" placeholder="Subject name (e.g. Physics)" style="width:180px;">
            <select id="newExamType">
                ${Object.entries(examLabels).map(([k,v]) => `<option value="${k}" ${k === exam ? 'selected' : ''}>${v}</option>`).join('')}
            </select>
            <input type="number" id="newMaxMark" placeholder="Max marks" style="width:90px;" min="1" max="1000">
            <button class="btn btn-primary btn-sm" onclick="confirmAddSub()">Add</button>
            <button class="btn btn-sm" onclick="toggleAddForm()">Cancel</button>
        </div>
    ` : '';

    panel.innerHTML = `
        <div class="subject-strip">${tabs}${addBtn}</div>
        ${addForm || ''}
        <div class="marks-card">
            ${roNote}
            ${renderTable(ro)}
        </div>
    `;
}

function renderTable(ro) {
    if (!subjects.length) {
        return `<div class="empty-state"><div class="empty-icon">📚</div><p>No subjects added yet</p><p class="hint">Click "+ Add Subject" above</p></div>`;
    }

    const sub = subjects[activeSub];
    const mm  = sub.maxMark;
    const exam = sub.exam;

    // Sort students by roll number
    const sorted = [...students].sort((a, b) => {
        const an = parseInt(a.roll_number) || 9999;
        const bn = parseInt(b.roll_number) || 9999;
        return an - bn;
    });

    // Show section column when viewing all sections of a class
    const showSectionCol = !currentSection;

    const rows = sorted.map(st => {
        const raw = sub.marks[st.id];
        const val = (raw !== undefined && raw !== '') ? Number(raw) : '';
        const pct = val !== '' ? getPct(val, mm) : null;
        const grd = pct !== null ? calcGrade(pct) : null;
        const gp  = gradePoint(pct);
        const inputCls = val !== '' ? (val > mm ? 'is-over' : pct < 33 ? 'is-warn' : 'is-good') : '';
        const barFill  = pct !== null ? `width:${Math.min(pct, 100)}%;background:${pctBarColor(pct)};` : 'width:0%;';

        // Extract section from student object (new model has separate section field)
        const section = st.section || getSection(st.class);

        return `<tr id="row-${st.id}">
            <td>
                <div class="student-name">${st.name}</div>
                <div class="student-roll">Roll ${st.roll_number || '—'}${showSectionCol && section ? ` · Sec ${section}` : ''}</div>
            </td>
            <td style="text-align:center;">
                ${ro
                    ? `<span style="font-weight:500;">${val !== '' ? val : '—'}</span>`
                    : `<input type="number" class="mark-input ${inputCls}" min="0" max="${mm}" step="0.5"
                        value="${val}" placeholder="—"
                        data-id="${st.id}" data-subidx="${activeSub}"
                        oninput="onInput(this)" onchange="onChange(this)" id="inp-${st.id}">`
                }
            </td>
            <td style="text-align:center; font-size:12px; color:#888;">${mm}</td>
            <td>
                <div class="pct-bar-wrap">
                    <div class="pct-bar-bg"><div class="pct-bar-fill" style="${barFill}" id="bar-${st.id}"></div></div>
                    <span class="pct-val" style="color:${pctBarColor(pct)};" id="pct-${st.id}">${pct !== null ? pct + '%' : '—'}</span>
                </div>
            </td>
            <td style="text-align:center;" id="grd-${st.id}">
                ${grd ? `<span class="grade-pill g-${grd.g}">${grd.g}</span>` : '<span class="grade-pill g-">—</span>'}
            </td>
            <td style="text-align:center;font-size:12px;font-weight:500;color:#666;" id="gp-${st.id}">
                ${gp !== null ? gp + ' GP' : '—'}
            </td>
            <td style="text-align:center;">
                <button class="btn btn-sm btn-icon" onclick="showReport(${st.id})" title="Report card">📄</button>
            </td>
        </tr>`;
    }).join('');

    const hdr = `<tr>
        <th style="width:28%;">Student</th>
        <th class="center" style="width:10%;">Marks</th>
        <th class="center" style="width:8%;">Max</th>
        <th style="width:20%;">Performance</th>
        <th class="center" style="width:8%;">Grade</th>
        <th class="center" style="width:8%;">GP</th>
        <th class="center" style="width:8%;">Report</th>
    </tr>`;

    const hdrCard = `
        <div class="marks-card-header">
            <h3>${sub.name} &nbsp;<span style="font-size:12px;color:#888;font-weight:400;">${examLabels[sub.exam] || sub.exam}</span></h3>
            <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
                ${ro ? '' : `<div class="max-mark-ctrl">
                    <span>Max marks:</span>
                    <input type="number" min="1" max="1000" value="${mm}"
                        style="width:64px;padding:5px 8px;border:1px solid #e0e0e0;border-radius:6px;font-size:13px;text-align:center;"
                        onchange="updateMaxMark(this.value)">
                </div>`}
                ${!ro ? `<button class="btn btn-sm" onclick="fillAllAbsent()" title="Mark 0 for absent">Zero absent</button>` : ''}
                <span style="font-size:12px;color:#888;">${students.length} students</span>
            </div>
        </div>`;

    return `${hdrCard}
        <div style="overflow-x:auto;">
        <table class="marks-table">
            <thead>${hdr}</thead>
            <tbody>${rows}</tbody>
        </table>
        </div>
        <div class="table-footer">
            <span>Subject: <strong>${sub.name}</strong> &nbsp;|&nbsp; Exam: <strong>${examLabels[sub.exam] || sub.exam}</strong> &nbsp;|&nbsp; Max: <strong>${mm}</strong></span>
            ${!ro ? `<button class="btn btn-sm" onclick="clearSubjectMarks()" style="color:var(--red-600);border-color:var(--red-100);">Clear marks</button>` : ''}
        </div>`;
}

// ── Input handlers ────────────────────────────────────────────────────────────
function onInput(inp) {
    const val = inp.value.trim();
    const max = subjects[activeSub].maxMark;
    const num = val !== '' ? Number(val) : null;
    const pct = num !== null ? getPct(num, max) : null;

    inp.classList.remove('is-over','is-good','is-warn');
    if (num !== null) {
        if (num > max) inp.classList.add('is-over');
        else if (pct < 33) inp.classList.add('is-warn');
        else inp.classList.add('is-good');
    }

    const id = Number(inp.dataset.id);
    updateRowLive(id, num, max, pct);
}

function onChange(inp) {
    const id  = Number(inp.dataset.id);
    const idx = Number(inp.dataset.subidx);
    const val = inp.value.trim();
    if (val === '') { delete subjects[idx].marks[id]; }
    else            { subjects[idx].marks[id] = Number(val); }
    renderSummary();
    setStatus('', '');
}

function updateRowLive(id, val, max, pct) {
    const barEl = document.getElementById('bar-' + id);
    const pctEl = document.getElementById('pct-' + id);
    const grdEl = document.getElementById('grd-' + id);
    const gpEl  = document.getElementById('gp-' + id);
    if (!barEl) return;

    if (pct !== null) {
        const c = pctBarColor(pct);
        barEl.style.width   = Math.min(pct, 100) + '%';
        barEl.style.background = c;
        pctEl.textContent   = pct + '%';
        pctEl.style.color   = c;
        const grd = calcGrade(pct);
        grdEl.innerHTML = `<span class="grade-pill g-${grd.g}">${grd.g}</span>`;
        const gp = gradePoint(pct);
        gpEl.textContent = gp !== null ? gp + ' GP' : '—';
    } else {
        barEl.style.width = '0%';
        pctEl.textContent = '—';
        pctEl.style.color = '#ccc';
        grdEl.innerHTML = '<span class="grade-pill g-">—</span>';
        gpEl.textContent = '—';
    }
}

// ── Subject management ────────────────────────────────────────────────────────
function switchSub(i) {
    activeSub = i;
    renderAll();
}

function toggleAddForm() {
    const f = document.getElementById('addSubForm');
    if (f) {
        f.classList.toggle('open');
        if (f.classList.contains('open')) document.getElementById('newSubName')?.focus();
        const btn = document.getElementById('addSubBtn');
        if (btn) btn.textContent = f.classList.contains('open') ? '↑ Close' : '+ Add Subject';
    }
}

function confirmAddSub() {
    const name = document.getElementById('newSubName').value.trim();
    const exam = document.getElementById('newExamType').value;
    const mm   = parseInt(document.getElementById('newMaxMark').value) || defaultMaxMarks[exam] || 100;

    if (!name) { showToast('Enter a subject name', 'error'); return; }
    if (!currentClass) { showToast('Select a class first', 'error'); return; }
    if (subjects.find(s => s.name === name && s.exam === exam)) {
        showToast(`${name} (${examLabels[exam]}) already exists`, 'error'); return;
    }

    subjects.push({ name, exam, maxMark: mm, marks: {} });
    activeSub = subjects.length - 1;
    document.getElementById('newSubName').value = '';
    renderAll();
    showToast('Subject added', 'success');
}

function removeSub(i) {
    if (!confirm(`Remove ${subjects[i].name}? All entered marks for this subject will be lost.`)) return;
    subjects.splice(i, 1);
    activeSub = Math.max(0, Math.min(activeSub, subjects.length - 1));
    renderAll();
}

function updateMaxMark(val) {
    const v = parseFloat(val);
    if (!v || v < 1) return;
    subjects[activeSub].maxMark = v;
    renderAll();
}

function clearSubjectMarks() {
    if (!confirm(`Clear all marks for ${subjects[activeSub].name}?`)) return;
    subjects[activeSub].marks = {};
    renderAll();
    showToast('Marks cleared', 'info');
}

function fillAllAbsent() {
    students.forEach(st => {
        if (subjects[activeSub].marks[st.id] === undefined || subjects[activeSub].marks[st.id] === '') {
            subjects[activeSub].marks[st.id] = 0;
        }
    });
    renderAll();
    showToast('Absent students marked 0', 'info');
}

// ── Save all marks ────────────────────────────────────────────────────────────
// OPTIMIZED: Uses new separate class/section model
async function saveAllMarks() {
    if (!currentClass || !subjects.length) { showToast('Nothing to save', 'error'); return; }
    if (isReadOnly) { showToast('View only — you cannot save marks', 'error'); return; }

    const baseClass = document.getElementById('classSelect').value;
    const section = document.getElementById('sectionSelect').value;

    if (IS_ADMIN) {
        console.log('Admin saving marks for:', baseClass, 'Section:', section || 'All');
    }

    setStatus('saving', 'Saving...');
    document.getElementById('saveBtn').disabled = true;

    const payload = [];
    subjects.forEach(sub => {
        students.forEach(st => {
            const v = sub.marks[st.id];
            if (v !== undefined && v !== '') {
                const pct = getPct(v, sub.maxMark);
                const grd = pct !== null ? calcGrade(pct).g : null;
                // Use student's stored class/section (new model) or fall back to current selection
                // Student's section comes from the section column now
                const studentSection = st.section || section || '';
                payload.push({
                    studentId: st.id,
                    className: st.class || baseClass,  // Base class only
                    section: studentSection,            // Section as separate value
                    subject: sub.name,
                    examType: sub.exam,
                    maxMark: sub.maxMark,
                    marksObtained: Number(v),
                    grade: grd
                });
            }
        });
    });

    if (!payload.length) {
        showToast('No marks entered yet', 'error');
        setStatus('', '');
        document.getElementById('saveBtn').disabled = false;
        return;
    }

    const r = await api('/api/marks/save', { method: 'POST', body: JSON.stringify({ records: payload }) });
    document.getElementById('saveBtn').disabled = false;
    if (r && r.success) {
        setStatus('saved', `Saved ${r.saved} records`);
        showToast(`✓ Saved ${r.saved} marks records`, 'success');
    } else {
        setStatus('error', 'Save failed');
        showToast(r?.message || 'Save failed', 'error');
    }
}

// ── Status chip ───────────────────────────────────────────────────────────────
function setStatus(type, text) {
    const el = document.getElementById('statusChip');
    if (!type) { el.style.display = 'none'; return; }
    el.style.display = 'inline-flex';
    el.innerHTML = `<span class="status-chip sc-${type}"><span class="dot"></span>${text}</span>`;
}

// ── Export CSV ────────────────────────────────────────────────────────────────
function exportCSV() {
    if (!subjects.length || !students.length) { showToast('No data to export', 'error'); return; }

    const sorted = [...students].sort((a, b) => (parseInt(a.roll_number) || 9999) - (parseInt(b.roll_number) || 9999));
    const hdrs   = ['Roll No', 'Student Name', ...subjects.map(s => `${s.name} (${examLabels[s.exam]}) [Max:${s.maxMark}]`), 'Total', 'Total Max', 'Overall %', 'Overall Grade'];

    const rows = sorted.map(st => {
        let totalObt = 0, totalMax = 0, enteredCount = 0;
        const cols = [st.roll_number || '', st.name];
        subjects.forEach(sub => {
            const v = sub.marks[st.id];
            const val = (v !== undefined && v !== '') ? Number(v) : '';
            cols.push(val);
            if (val !== '') { totalObt += val; totalMax += sub.maxMark; enteredCount++; }
        });
        const overallPct = totalMax ? (totalObt / totalMax * 100).toFixed(1) : '';
        const overallGrd = overallPct !== '' ? calcGrade(parseFloat(overallPct)).g : '';
        cols.push(totalObt || '', totalMax || '', overallPct, overallGrd);
        return cols.map(c => `"${c}"`).join(',');
    });

    const csv  = [hdrs.join(','), ...rows].join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const a    = document.createElement('a');
    a.href     = URL.createObjectURL(blob);
    a.download = `marks_${currentClass}_${Date.now()}.csv`;
    a.click();
    showToast('CSV exported', 'success');
}

// ── Report card ───────────────────────────────────────────────────────────────
async function showReport(studentId) {
    const st = students.find(s => s.id === studentId);
    if (!st) return;

    // Merge saved + in-memory
    const dbData = await api(`/api/marks/report/${studentId}?class=${encodeURIComponent(currentClass)}`);
    let records  = dbData && dbData.success ? dbData.records : [];

    // Overlay in-memory (unsaved) marks
    subjects.forEach(sub => {
        const v = sub.marks[studentId];
        if (v !== undefined && v !== '') {
            const exists = records.find(r => r.subject === sub.name && r.exam_type === sub.exam);
            if (!exists) {
                const pct = getPct(v, sub.maxMark);
                records.push({ subject: sub.name, exam_type: sub.exam, marks_obtained: Number(v), max_mark: sub.maxMark, grade: pct !== null ? calcGrade(pct).g : null });
            }
        }
    });

    // Calculate overall stats
    const totalObt = records.reduce((a, r) => a + Number(r.marks_obtained), 0);
    const totalMax = records.reduce((a, r) => a + Number(r.max_mark), 0);
    const overallPct = totalMax ? (totalObt / totalMax * 100) : 0;
    const overallGrd = overallPct ? calcGrade(overallPct) : null;

    // Subject-wise GPA
    const subRows = records.map(r => {
        const pct = getPct(r.marks_obtained, r.max_mark);
        const grd = pct !== null ? calcGrade(pct) : null;
        const gp  = gradePoint(pct);
        return `<tr>
            <td><strong>${r.subject}</strong></td>
            <td style="color:#888;font-size:12px;">${examLabels[r.exam_type] || r.exam_type}</td>
            <td style="text-align:center;font-weight:500;">${r.marks_obtained}</td>
            <td style="text-align:center;color:#888;">${r.max_mark}</td>
            <td style="text-align:center;">${pct !== null ? pct + '%' : '—'}</td>
            <td style="text-align:center;">
                ${grd ? `<span class="grade-pill g-${grd.g}">${grd.g}</span>` : '—'}
            </td>
            <td style="text-align:center;font-size:12px;color:#666;">${gp !== null ? gp + ' GP' : '—'}</td>
        </tr>`;
    }).join('');

    // CGPA
    const cgpa = records.length ? (records.reduce((a, r) => {
        const pct = getPct(r.marks_obtained, r.max_mark);
        return a + (gradePoint(pct) || 0);
    }, 0) / records.length).toFixed(2) : '—';

    document.getElementById('reportBody').innerHTML = `
        <div class="report-student">${st.name}</div>
        <div class="report-meta">Class ${currentClass} &nbsp;·&nbsp; Roll: ${st.roll_number || '—'} &nbsp;·&nbsp; Generated: ${new Date().toLocaleDateString('en-IN')}</div>

        ${records.length ? `
        <div class="report-total-bar">
            <div>
                <div style="font-size:13px;opacity:0.8;">Overall Performance</div>
                <div style="font-size:15px;margin-top:3px;">${totalObt.toFixed(1)} / ${totalMax} marks &nbsp;·&nbsp; CGPA: ${cgpa}</div>
            </div>
            <div style="text-align:right;">
                <div class="big">${overallPct.toFixed(1)}%</div>
                <div class="note">Grade ${overallGrd ? overallGrd.g : '—'} — ${overallGrd ? overallGrd.label : ''}</div>
            </div>
        </div>
        <table class="report-tbl">
            <thead><tr>
                <th>Subject</th><th>Exam</th><th style="text-align:center;">Marks</th>
                <th style="text-align:center;">Max</th><th style="text-align:center;">%</th>
                <th style="text-align:center;">Grade</th><th style="text-align:center;">GP</th>
            </tr></thead>
            <tbody>${subRows}</tbody>
        </table>` : `<div style="text-align:center;padding:2rem;color:#aaa;">No marks recorded for this student yet.</div>`}

        <button class="print-btn" onclick="window.print()">Print Report Card</button>
    `;

    document.getElementById('reportModal').classList.add('open');
}

function closeReport() {
    document.getElementById('reportModal').classList.remove('open');
}
document.getElementById('reportModal').addEventListener('click', e => {
    if (e.target === document.getElementById('reportModal')) closeReport();
});

// ── Toast ─────────────────────────────────────────────────────────────────────
function showToast(msg, type = 'info') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast ${type} show`;
    clearTimeout(t._t);
    t._t = setTimeout(() => t.classList.remove('show'), 3000);
}

// ── Keyboard shortcut: Ctrl+S ─────────────────────────────────────────────────
document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 's') {
        e.preventDefault();
        saveAllMarks();
    }
});

// ── Boot ──────────────────────────────────────────────────────────────────────
init();
</script>
